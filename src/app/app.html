@switch (extractionState().status) {
  
  @case ('idle') {
    <app-resume-input (extract)="extract($event)"></app-resume-input>
  }

  @case ('loading') {
    @let state = extractionState();
    @if(state.status === 'loading'){
    <app-loading [startedAt]="state.startedAt"></app-loading>
    }  
  }

  @case('error'){
    <app-error></app-error>
  }

  @case ('success') {
    @let state = extractionState();
    @if(state.status === 'success'){
      <p>{{stringify(state.data)}}</p>
    }
    
  }

}
