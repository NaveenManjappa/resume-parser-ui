<div class="card result-card">
  <div class="result-topbar">
    <div class="result-topbar__meta">
      <app-metrics [metadata]="data().metadata"></app-metrics>
    </div>
    <button class="btn-ghost-sm" type="button" (click)="reset.emit()">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 8a6 6 0 1012 0A6 6 0 002 8z" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 5v3.5l2 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Parse another
    </button>
  </div>

  <div class="tab-bar">
    <button type="button" [class.active]="activeTab() === 'structured'" (click)="setTab('structured')">
      Structured view
    </button>
    <button type="button" [class.active]="activeTab() === 'json'" (click)="setTab('json')">
      Raw JSON
    </button>
  </div>

  <div class="tab-content">
    @switch (activeTab()) {
      @case('structured'){
        <app-resume-viewer [profile]="data().profile"/>
      }
      @case('json'){
        <pre class="json-view">{{jsonText()}}</pre>
      }
    }
  </div>
</div>
