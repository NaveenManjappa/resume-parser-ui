<div class="metrics">
  <span class="metric">
    <span class="label">Model</span>
    <span class="value">{{ metadata().model_used ?? '-' }}</span>
  </span>
  <span class="separator">.</span>
  <span class="metric">
    <span class="label">Tokens</span>
    <span class="value">
      {{ ( metadata().prompt_tokens | number) ?? '-' }} in /
      {{ ( metadata().completion_tokens | number) ?? '-' }} out
    </span>
  </span>
  <span class="separator">.</span>
  <span class="metric">
    <span class="label">Time</span>
    <span class="value">{{ timeDisplay() }}</span>
  </span>
</div>
